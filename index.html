<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project HEARTBEAT | Live</title>
    
    <!-- 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/utc.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/timezone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e1117;
            color: #fafafa;
            line-height: 1.6;
        }
        .app-container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 350px;
            background: #262730;
            padding: 2rem;
            overflow-y: auto;
            border-right: 1px solid #3a3a3a;
        }
        .sidebar h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #ff4b4b;
        }
        .connection-info {
            padding: 0.75rem;
            border-radius: 6px;
            margin: 1rem 0;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .connection-success { 
            background: #1a2e1a; 
            color: #00ff7f; 
            border: 1px solid #00ff7f; 
        }
        .connection-error { 
            background: #2d1a1a; 
            color: #ff6b6b; 
            border: 1px solid #ff6b6b; 
        }
        .connection-loading { 
            background: #1a1a2e; 
            color: #4a9eff; 
            border: 1px solid #4a9eff; 
        }
        .connection-warning {
            background: #2e2e1a;
            color: #ffd700;
            border: 1px solid #ffd700;
        }
        .search-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            background: #0e1117;
            color: #fafafa;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        .search-input:focus { 
            outline: none; 
            border-color: #ff4b4b; 
        }
        .search-btn {
            width: 100%;
            padding: 0.75rem;
            background: #ff4b4b;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .search-btn:hover:not(:disabled) { 
            background: #ff6b6b; 
        }
        .search-btn:disabled { 
            background: #555; 
            cursor: not-allowed; 
        }
        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            background: #1a1a1a;
        }
        .site-card {
            background: #262730;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            border: 1px solid #3a3a3a;
            cursor: pointer;
            transition: all 0.3s;
        }
        .site-card:hover { 
            background: #2a2a2a; 
            border-color: #ff4b4b; 
        }
        .loading { 
            text-align: center; 
            padding: 2rem; 
            color: #aaa; 
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1>💓 HEARTBEAT</h1>
            <h2 style="font-size: 1.2rem; margin-bottom: 1rem;">📡 관제 타겟 검색</h2>
            
            <div id="connection-status" class="connection-info connection-loading">
                연결 확인 중...
            </div>
            <div id="db-time" style="font-size: 0.85rem; color: #888; margin-bottom: 1rem;"></div>
            
            <p style="font-size: 0.9rem; color: #aaa; margin-bottom: 1rem;">
                충전소명, 주소, 사이트명 등으로 검색하세요.
            </p>
            
            <input type="text" id="search-input" class="search-input" placeholder="예: 서울 아파트, 노원 에버온...">
            <button id="search-btn" class="search-btn">🔍 검색</button>
            
            <div id="search-results" style="margin-top: 1.5rem;"></div>
        </aside>

        <main class="main-content">
            <h1 style="font-size: 2rem; margin-bottom: 1.5rem;">📊 사이트 통합 관제 대시보드</h1>
            <div id="dashboard-area">
                <div style="padding: 2rem; text-align: center; color: #888;">
                    👈 왼쪽 사이드바에서 검색하여 사이트를 선택하세요.
                </div>
            </div>
        </main>
    </div>

    <script>
        // ============================================
        // 중복 실행 방지 및 안전한 초기화
        // ============================================
        (function() {
            'use strict';
            
            if (window.HEARTBEAT_INITIALIZED) {
                console.log('⚠️ 이미 초기화됨 - 중복 실행 방지');
                return;
            }
            window.HEARTBEAT_INITIALIZED = true;

            const APP_STATE = {
                supabaseClient: null,
                dbLastTime: null,
                searchResults: []
            };

            // ============================================
            // 타임아웃 처리가 포함된 초기화 함수
            // ============================================
            async function initialize() {
                const statusDiv = document.getElementById('connection-status');
                const dbTimeDiv = document.getElementById('db-time');
                
                try {
                    console.log('🚀 HEARTBEAT 초기화 시작');
                    
                    // 1. 라이브러리 확인
                    if (typeof dayjs === 'undefined') {
                        throw new Error('Day.js 라이브러리 로딩 실패');
                    }
                    if (typeof window.supabase === 'undefined') {
                        throw new Error('Supabase 라이브러리 로딩 실패');
                    }
                    console.log('✅ 라이브러리 로드 완료');
                    
                    // 2. Day.js 플러그인 초기화
                    if (window.dayjs_plugin_utc && window.dayjs_plugin_timezone) {
                        dayjs.extend(window.dayjs_plugin_utc);
                        dayjs.extend(window.dayjs_plugin_timezone);
                    }
                    
                    // 3. Supabase 클라이언트 생성
                    statusDiv.textContent = "데이터베이스 연결 중...";
                    
                    const SUPABASE_URL = "https://gkwtucqymzkvpurcpihk.supabase.co";
                    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdrd3R1Y3F5bXprdnB1cmNwaWhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDIxNDcsImV4cCI6MjA4OTQ3ODE0N30.V0FnaZ-BaTEYUOKfzxvQ-T4Qk4E83LNIi4GflQsURUg";
                    
                    APP_STATE.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    console.log('✅ Supabase 클라이언트 생성 완료');
                    
                    // 4. 연결 테스트 (타임아웃 처리 포함)
                    await testDatabaseConnection(statusDiv, dbTimeDiv);
                    
                } catch (error) {
                    console.error('❌ 초기화 실패:', error);
                    statusDiv.textContent = `❌ 초기화 실패: ${error.message}`;
                    statusDiv.className = "connection-info connection-error";
                }
            }

            // ============================================
            // 스마트 데이터베이스 연결 테스트
            // ============================================
            async function testDatabaseConnection(statusDiv, dbTimeDiv) {
                try {
                    // 타임아웃 프로미스 (10초)
                    const timeoutPromise = new Promise((_, reject) => 
                        setTimeout(() => reject(new Error('연결 시간 초과 (10초)')), 10000)
                    );
                    
                    // 1차 시도: status_history에서 최신 시간 조회 (인덱스 있으면 빠름)
                    console.log('1차 연결 테스트: status_history 최신 시간 조회');
                    
                    const heavyQueryPromise = APP_STATE.supabaseClient
                        .from('status_history')
                        .select('collected_at')
                        .order('collected_at', { ascending: false })
                        .limit(1);
                    
                    const { data, error } = await Promise.race([heavyQueryPromise, timeoutPromise]);
                    
                    if (error) throw error;
                    
                    // 성공: 인덱스가 잘 작동하고 있음
                    statusDiv.textContent = "✅ 연결 성공 (최적화됨)";
                    statusDiv.className = "connection-info connection-success";
                    
                    if (data && data.length > 0) {
                        APP_STATE.dbLastTime = dayjs(data[0].collected_at);
                        dbTimeDiv.textContent = `🕒 DB 최종 수신: ${APP_STATE.dbLastTime.format('YYYY-MM-DD HH:mm')}`;
                    }
                    
                    console.log('✅ HEARTBEAT 초기화 완료 (최적화 모드)');
                    
                } catch (firstError) {
                    console.warn('1차 테스트 실패, 2차 테스트로 전환:', firstError.message);
                    
                    // 2차 시도: 가벼운 charger_master 테이블로 연결 확인
                    try {
                        const lightQueryPromise = APP_STATE.supabaseClient
                            .from('charger_master')
                            .select('charger_id')
                            .limit(1);
                        
                        const timeoutPromise2 = new Promise((_, reject) => 
                            setTimeout(() => reject(new Error('2차 연결 시간 초과')), 5000)
                        );
                        
                        const { data: lightData, error: lightError } = await Promise.race([lightQueryPromise, timeoutPromise2]);
                        
                        if (lightError) throw lightError;
                        
                        // 2차 성공: 기본 연결은 가능하지만 인덱스 최적화 필요
                        statusDiv.textContent = "⚠️ 연결 성공 (DB 최적화 권장)";
                        statusDiv.className = "connection-info connection-warning";
                        
                        const currentTime = new Date();
                        dbTimeDiv.textContent = `🕒 연결 시간: ${currentTime.toLocaleString('ko-KR')} (DB 인덱스 최적화 필요)`;
                        
                        console.log('⚠️ HEARTBEAT 초기화 완료 (호환 모드)');
                        
                    } catch (secondError) {
                        throw new Error(`데이터베이스 연결 실패: ${secondError.message}`);
                    }
                }
            }

            // ============================================
            // 최적화된 검색 함수
            // ============================================
            async function performSearch() {
                const keyword = document.getElementById('search-input').value.trim();
                const resultsDiv = document.getElementById('search-results');
                const searchBtn = document.getElementById('search-btn');
                
                if (!keyword) {
                    alert('검색어를 입력하세요');
                    return;
                }
                
                if (!APP_STATE.supabaseClient) {
                    alert('데이터베이스가 연결되지 않았습니다');
                    return;
                }
                
                searchBtn.disabled = true;
                searchBtn.textContent = '검색 중...';
                resultsDiv.innerHTML = '<div class="loading">🔄 검색 중...</div>';
                
                try {
                    // 검색 타임아웃 (15초)
                    const timeoutPromise = new Promise((_, reject) => 
                        setTimeout(() => reject(new Error('검색 시간 초과 (15초)')), 15000)
                    );
                    
                    // 검색 쿼리 최적화
                    const tokens = keyword.split(/\s+/).filter(t => t.length > 0);
                    const primaryKeyword = tokens[0]; // 첫 번째 키워드로 1차 필터링
                    
                    const queryPromise = APP_STATE.supabaseClient
                        .from('charger_master')
                        .select('charger_id, station_name, address1, site_id, station_id')
                        .or(`station_name.ilike.%${primaryKeyword}%,address1.ilike.%${primaryKeyword}%,site_id.ilike.%${primaryKeyword}%`)
                        .limit(100);
                    
                    const { data, error } = await Promise.race([queryPromise, timeoutPromise]);
                    
                    if (error) throw error;
                    
                    if (!data || data.length === 0) {
                        resultsDiv.innerHTML = '<div style="padding: 1rem; color: #888; text-align: center;">검색 결과가 없습니다</div>';
                        return;
                    }
                    
                    // 클라이언트 사이드에서 추가 필터링 (다중 키워드)
                    let filteredData = data;
                    if (tokens.length > 1) {
                        filteredData = data.filter(row => {
                            const searchText = `${row.station_name || ''} ${row.address1 || ''}`.toLowerCase();
                            return tokens.every(token => searchText.includes(token.toLowerCase()));
                        });
                    }
                    
                    // 사이트별 그룹핑 및 렌더링
                    const siteGroups = groupBySite(filteredData);
                    APP_STATE.searchResults = siteGroups;
                    renderSearchResults(siteGroups);
                    
                } catch (error) {
                    console.error('검색 오류:', error);
                    
                    if (error.message.includes('시간 초과')) {
                        resultsDiv.innerHTML = `
                            <div class="connection-info connection-warning">
                                ⚠️ 검색 시간 초과<br>
                                <small>더 구체적인 검색어를 입력하거나 잠시 후 다시 시도하세요.</small>
                            </div>
                        `;
                    } else {
                        resultsDiv.innerHTML = `<div class="connection-info connection-error">검색 오류: ${error.message}</div>`;
                    }
                } finally {
                    searchBtn.disabled = false;
                    searchBtn.textContent = '🔍 검색';
                }
            }

            // ============================================
            // 사이트 그룹핑
            // ============================================
            function groupBySite(data) {
                const groups = new Map();
                
                data.forEach(row => {
                    const key = row.site_id || row.station_id || 'unknown';
                    
                    if (!groups.has(key)) {
                        groups.set(key, {
                            key: key,
                            station_name: row.station_name || '',
                            address: row.address1 || '',
                            site_id: row.site_id,
                            station_id: row.station_id,
                            count: 0
                        });
                    }
                    
                    groups.get(key).count++;
                });
                
                return Array.from(groups.values()).sort((a, b) => b.count - a.count);
            }

            // ============================================
            // 검색 결과 렌더링
            // ============================================
            function renderSearchResults(siteGroups) {
                const resultsDiv = document.getElementById('search-results');
                
                let html = `<div style="margin-bottom: 1rem; padding: 0.75rem; background: #1a2e1a; border-radius: 6px; border: 1px solid #00ff7f;">
                    <strong style="color: #00ff7f;">✅ ${siteGroups.length}개 사이트 검색됨</strong>
                </div>`;
                
                siteGroups.forEach((group, index) => {
                    html += `
                        <div class="site-card" onclick="selectSite(${index})">
                            <div style="font-size: 1.1rem; font-weight: bold; color: #ff4b4b; margin-bottom: 0.5rem;">
                                ${group.station_name || group.key}
                            </div>
                            <div style="color: #aaa; font-size: 0.9rem; margin-bottom: 0.5rem;">
                                📍 ${group.address || '-'}
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-size: 0.8rem; color: #888;">🆔 ${group.site_id || group.station_id}</span>
                                <span style="background: #ff4b4b; color: white; padding: 0.25rem 0.75rem; border-radius: 12px; font-size: 0.8rem; font-weight: bold;">
                                    ${group.count}대
                                </span>
                            </div>
                        </div>
                    `;
                });
                
                resultsDiv.innerHTML = html;
            }

            // ============================================
            // 사이트 선택 (전역 함수로 노출)
            // ============================================
            window.selectSite = function(index) {
                const site = APP_STATE.searchResults[index];
                if (!site) return;
                
                const dashboardArea = document.getElementById('dashboard-area');
                dashboardArea.innerHTML = `
                    <div style="background: #262730; padding: 2rem; border-radius: 8px; border: 1px solid #3a3a3a;">
                        <h2 style="color: #ff4b4b; margin-bottom: 1rem;">🏢 ${site.station_name || site.key}</h2>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                            <div><strong>주소:</strong> ${site.address || '-'}</div>
                            <div><strong>충전기:</strong> ${site.count}대</div>
                            <div><strong>사이트ID:</strong> ${site.site_id || '-'}</div>
                            <div><strong>충전소ID:</strong> ${site.station_id || '-'}</div>
                        </div>
                        <div style="background: #1a1a1a; padding: 1rem; border-radius: 6px; color: #888; font-size: 0.9rem;">
                            💡 상세 대시보드 기능은 곧 추가될 예정입니다.<br>
                            현재는 검색 및 기본 정보 확인이 가능합니다.
                        </div>
                    </div>
                `;
            };

            // ============================================
            // 이벤트 리스너 등록
            // ============================================
            document.addEventListener('DOMContentLoaded', function() {
                initialize();
                
                const searchBtn = document.getElementById('search-btn');
                if (searchBtn) {
                    searchBtn.addEventListener('click', performSearch);
                }
                
                const searchInput = document.getElementById('search-input');
                if (searchInput) {
                    searchInput.addEventListener('keypress', function(e) {
                        if (e.key === 'Enter') {
                            performSearch();
                        }
                    });
                }
            });

        })();
    </script>
</body>
</html>
